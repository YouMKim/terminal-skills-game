name: CI + Deploy to GitHub Pages

# Pages serves the gh-pages branch (auto-enabled when that branch first
# appeared). Every push to main: run the test suites, and if green,
# fast-forward gh-pages to match — Pages redeploys from it automatically.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node tests/smoke.mjs
      - run: node tests/dom-smoke.mjs

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: git push origin HEAD:gh-pages --force
